name: Build APK

# Builds the Hyle Worlds live-wallpaper APK and publishes it to a rolling
# prerelease ("hyle-worlds-latest") so there's a stable, direct download link.
on:
  workflow_dispatch:
  push:
    paths:
      - "wallpaper/**"
      - "hyle/**"
      - "gradle/**"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install platform + build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Assemble debug APK
        run: ./gradlew --no-daemon :wallpaper:assembleDebug
      - name: Stage APK
        run: |
          mkdir -p dist
          cp wallpaper/build/outputs/apk/debug/wallpaper-debug.apk dist/hyle-worlds-debug.apk
          ls -la dist
      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyle-worlds-debug-apk
          path: dist/hyle-worlds-debug.apk
          if-no-files-found: error
      - name: Publish to rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hyle-worlds-latest
          name: Hyle Worlds — latest debug build
          body: |
            Auto-built debug APK of the **Hyle Worlds** Brutalist live wallpaper.
            Sideload `hyle-worlds-debug.apk`, open **Hyle Worlds**, and tap *Set as live wallpaper*.
            Built from `${{ github.sha }}`.
          prerelease: true
          files: dist/hyle-worlds-debug.apk
