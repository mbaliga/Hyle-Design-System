name: Storybook

# Builds Storybook and publishes it to GitHub Pages:
#   https://mbaliga.github.io/Hyle-Design-System/
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "stories/**"
      - ".storybook/**"
      - "tokens/**"
      - "scripts/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/storybook.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build Storybook (runs tokens:build first)
        run: npm run build-storybook
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
