name: CI

# Hyle is pure-data + Compose tokens — JVM-testable, no native build. Public repo,
# so GitHub Actions minutes are free.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install platform + build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Token tests (:hyle:test)
        run: ./gradlew --no-daemon :hyle:test
      - name: Build the live wallpaper (:wallpaper)
        run: ./gradlew --no-daemon :wallpaper:assembleDebug
