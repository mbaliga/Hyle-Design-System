<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texture Background Generator</title>
<style>
  :root {
    --bg: #0e0e12;
    --panel: #17171e;
    --panel-2: #1e1e28;
    --line: #2a2a36;
    --text: #e8e8ef;
    --muted: #8a8a99;
    --accent: #6c5ce7;
    --accent-soft: #a29bfe;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    height: 100vh;
    overflow-y: auto;
    padding: 22px 20px 40px;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 22px; }
  .group { margin-bottom: 22px; }
  .group-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .seg {
    display: flex;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .seg button {
    flex: 1;
    min-width: 0;
    padding: 7px 4px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--accent); color: #fff; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .row label { font-size: 13px; color: var(--text); }
  .val { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 42px; text-align: right; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--line); outline: none; margin: 8px 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent-soft); cursor: pointer; border: 2px solid var(--panel);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent-soft); cursor: pointer; border: 2px solid var(--panel);
  }
  .colors { display: flex; flex-direction: column; gap: 8px; }
  .color-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 8px;
  }
  .color-item input[type=color] {
    -webkit-appearance: none; appearance: none;
    width: 34px; height: 34px; border: none; border-radius: 6px;
    background: none; cursor: pointer; padding: 0;
  }
  .color-item input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-item input[type=color]::-webkit-color-swatch { border: 1px solid var(--line); border-radius: 6px; }
  .color-item input[type=text] {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-size: 13px; font-family: 'SF Mono', ui-monospace, monospace; outline: none;
    text-transform: uppercase; min-width: 0;
  }
  .color-item button.rm {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1;
  }
  .color-item button.rm:hover { color: #ff6b6b; }
  .add-color {
    width: 100%; padding: 8px; margin-top: 8px;
    background: var(--panel-2); border: 1px dashed var(--line);
    color: var(--muted); border-radius: 8px; cursor: pointer;
    font-size: 12px; font-family: inherit;
  }
  .add-color:hover { color: var(--text); border-color: var(--accent); }
  .dims { display: flex; gap: 8px; }
  .dim-field { flex: 1; }
  .dim-field span { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  .dim-field input {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); border-radius: 7px; padding: 8px; font-size: 13px;
    font-family: inherit; outline: none;
  }
  .dim-field input:focus { border-color: var(--accent); }
  .export-btn {
    width: 100%; padding: 12px; margin-top: 4px;
    background: var(--accent); border: none; color: #fff;
    border-radius: 9px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .export-btn:hover { background: #5a4bd4; }
  .rand-btn {
    width: 100%; padding: 10px; margin-top: 8px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 9px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
  }
  .rand-btn:hover { border-color: var(--accent); }

  .stage {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px; overflow: hidden;
    background:
      linear-gradient(45deg, #16161c 25%, transparent 25%),
      linear-gradient(-45deg, #16161c 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #16161c 75%),
      linear-gradient(-45deg, transparent 75%, #16161c 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #101015;
  }
  .canvas-wrap {
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    border-radius: 4px; overflow: hidden; max-width: 100%; max-height: 100%;
  }
  canvas { display: block; max-width: 100%; max-height: calc(100vh - 80px); }
  .hint { position: fixed; bottom: 16px; right: 20px; font-size: 11px; color: var(--muted); }
  @media (max-width: 820px) {
    body { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .sidebar { order: 2; height: 45vh; border-right: none; border-top: 1px solid var(--line); }
    .stage { order: 1; height: 55vh; padding: 20px; }
  }
</style>
</head>
<body>
<div class="sidebar">
  <h1>Texture Background</h1>
  <div class="sub">Generate grainy gradient backdrops</div>

  <div class="group">
    <div class="group-label">Fill Type</div>
    <div class="seg" id="fillType">
      <button data-v="solid">Solid</button>
      <button data-v="linear" class="active">Linear</button>
      <button data-v="radial">Radial</button>
      <button data-v="mesh">Mesh</button>
    </div>
    <div class="row" id="angleRow">
      <label>Angle</label>
      <span class="val" id="angleVal">135°</span>
    </div>
    <input type="range" id="angle" min="0" max="360" value="135">
  </div>

  <div class="group">
    <div class="group-label">Colors</div>
    <div class="colors" id="colors"></div>
    <button class="add-color" id="addColor">+ Add color</button>
  </div>

  <div class="group">
    <div class="group-label">Texture</div>
    <div class="seg" id="texType">
      <button data-v="grain" class="active">Grain</button>
      <button data-v="fine">Fine</button>
      <button data-v="noise">Noise</button>
      <button data-v="none">None</button>
    </div>
    <div class="row"><label>Intensity</label><span class="val" id="grainVal">40</span></div>
    <input type="range" id="grain" min="0" max="100" value="40">
    <div class="row"><label>Scale</label><span class="val" id="scaleVal">1.0×</span></div>
    <input type="range" id="scale" min="5" max="40" value="10">
  </div>

  <div class="group">
    <div class="group-label">Vignette</div>
    <div class="row"><label>Strength</label><span class="val" id="vigVal">0</span></div>
    <input type="range" id="vig" min="0" max="100" value="0">
  </div>

  <div class="group">
    <div class="group-label">Motion</div>
    <div class="seg" id="motionType">
      <button data-v="none" class="active">None</button>
      <button data-v="drift">Drift</button>
      <button data-v="pulse">Pulse</button>
    </div>
    <div class="seg" style="margin-top:0;">
      <button data-v="shimmer" data-grp="motion">Shimmer</button>
      <button data-v="rotate" data-grp="motion">Rotate</button>
      <button data-v="wave" data-grp="motion">Wave</button>
    </div>
    <div class="row" id="speedRow" style="opacity:.35;">
      <label>Speed</label><span class="val" id="speedVal">50</span>
    </div>
    <input type="range" id="speed" min="5" max="100" value="50" disabled>
  </div>

  <div class="group">
    <div class="group-label">Aspect Ratio</div>
    <div class="seg" id="ratio">
      <button data-v="16:9" class="active">16:9</button>
      <button data-v="4:3">4:3</button>
      <button data-v="1:1">1:1</button>
      <button data-v="9:16">9:16</button>
    </div>
    <div class="seg" style="margin-top:0;">
      <button data-v="3:2" data-grp="ratio">3:2</button>
      <button data-v="21:9" data-grp="ratio">21:9</button>
      <button data-v="custom" data-grp="ratio">Custom</button>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Output Size (px)</div>
    <div class="dims">
      <div class="dim-field"><span>Width</span><input type="number" id="w" value="1920"></div>
      <div class="dim-field"><span>Height</span><input type="number" id="h" value="1080"></div>
    </div>
  </div>

  <button class="rand-btn" id="rand">↻ Randomize palette</button>
  <button class="export-btn" id="export">Download PNG</button>
  <button class="rand-btn" id="exportVideo" style="margin-top:8px;">⏺ Download animation (WebM, 4s loop)</button>
</div>

<div class="stage">
  <div class="canvas-wrap"><canvas id="cv"></canvas></div>
</div>
<div class="hint">Preview scaled to fit · exports at full resolution</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const state = {
  fill: 'linear',
  angle: 135,
  colors: ['#7b6cf6', '#3a2f8f', '#141428'],
  texType: 'grain',
  grain: 40,
  scale: 10,
  vig: 0,
  ratio: '16:9',
  w: 1920,
  h: 1080,
  motion: 'none',
  speed: 50,
};

const PALETTES = [
  ['#7b6cf6','#3a2f8f','#141428'],
  ['#ff9a76','#ff6a88','#3a1c71'],
  ['#0f2027','#203a43','#2c5364'],
  ['#f6d365','#fda085','#96322d'],
  ['#a8edea','#5f72bd','#1b1b3a'],
  ['#ee9ca7','#7a5c8e','#232526'],
  ['#08203e','#557c93','#e8e8e8'],
  ['#3a1c71','#d76d77','#ffaf7b'],
];

/* ---- Colors UI ---- */
function renderColors() {
  const box = document.getElementById('colors');
  box.innerHTML = '';
  const isSolid = state.fill === 'solid';
  const list = isSolid ? state.colors.slice(0,1) : state.colors;
  list.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'color-item';
    item.innerHTML = `
      <input type="color" value="${c}">
      <input type="text" value="${c.toUpperCase()}" maxlength="7">
      ${(!isSolid && state.colors.length>2)?'<button class="rm">×</button>':''}`;
    const picker = item.querySelector('input[type=color]');
    const text = item.querySelector('input[type=text]');
    picker.oninput = () => { state.colors[i]=picker.value; text.value=picker.value.toUpperCase(); draw(); };
    text.oninput = () => { if(/^#[0-9a-fA-F]{6}$/.test(text.value)){ state.colors[i]=text.value; picker.value=text.value; draw(); } };
    const rm = item.querySelector('.rm');
    if(rm) rm.onclick = () => { state.colors.splice(i,1); renderColors(); draw(); };
    box.appendChild(item);
  });
  document.getElementById('addColor').style.display = (isSolid || state.colors.length>=5)?'none':'block';
}
document.getElementById('addColor').onclick = () => {
  if(state.colors.length<5){ state.colors.push('#ffffff'); renderColors(); draw(); }
};

/* ---- Segmented controls ---- */
function bindSeg(id, key, cb){
  document.querySelectorAll(`#${id} button`).forEach(b=>{
    b.onclick = () => {
      document.querySelectorAll(`#${id} button`).forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state[key]=b.dataset.v; cb&&cb(); draw();
    };
  });
}
bindSeg('fillType','fill',()=>{
  document.getElementById('angleRow').style.opacity = state.fill==='linear'?1:.35;
  document.getElementById('angle').disabled = state.fill!=='linear';
  renderColors();
});
bindSeg('texType','texType');

// motion buttons (two rows share one group)
function bindMotion(){
  const btns = document.querySelectorAll('#motionType button, [data-grp="motion"]');
  btns.forEach(b=>{
    b.onclick=()=>{
      btns.forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.motion=b.dataset.v;
      const on = state.motion!=='none';
      document.getElementById('speedRow').style.opacity = on?1:.35;
      document.getElementById('speed').disabled = !on;
      updateAnimLoop();
    };
  });
}
bindMotion();

// ratio buttons (two rows share one group)
function bindRatio(){
  const btns = document.querySelectorAll('#ratio button, [data-grp="ratio"]');
  btns.forEach(b=>{
    b.onclick=()=>{
      btns.forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.ratio=b.dataset.v; applyRatio(); draw();
    };
  });
}
bindRatio();

function applyRatio(){
  if(state.ratio==='custom') return;
  const [rw,rh]=state.ratio.split(':').map(Number);
  const base = Math.max(state.w, state.h, 1080);
  let w,h;
  if(rw>=rh){ w=base; h=Math.round(base*rh/rw); }
  else { h=base; w=Math.round(base*rw/rh); }
  // keep long edge at a clean number
  const long = 1920;
  if(rw>=rh){ w=long; h=Math.round(long*rh/rw); } else { h=long; w=Math.round(long*rw/rh); }
  state.w=w; state.h=h;
  document.getElementById('w').value=w;
  document.getElementById('h').value=h;
}

/* ---- Sliders ---- */
function bindRange(id, key, fmt){
  const el=document.getElementById(id), out=document.getElementById(id+'Val');
  el.oninput=()=>{ state[key]=+el.value; if(out)out.textContent=fmt(el.value); draw(); };
}
bindRange('angle','angle',v=>v+'°');
bindRange('grain','grain',v=>v);
bindRange('scale','scale',v=>(v/10).toFixed(1)+'×');
bindRange('vig','vig',v=>v);
bindRange('speed','speed',v=>v);

document.getElementById('w').oninput=()=>{ state.w=+document.getElementById('w').value||1; setCustom(); draw(); };
document.getElementById('h').oninput=()=>{ state.h=+document.getElementById('h').value||1; setCustom(); draw(); };
function setCustom(){
  document.querySelectorAll('#ratio button, [data-grp="ratio"]').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-v="custom"]').classList.add('active');
  state.ratio='custom';
}

document.getElementById('rand').onclick=()=>{
  const p=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  state.colors=[...p]; renderColors(); draw();
};

/* ---- Drawing ---- */
let noiseCache=null, noiseCacheKey='';
function buildNoise(w,h){
  const key=`${w}x${h}`;
  if(noiseCache && noiseCacheKey===key) return noiseCache;
  const nc=document.createElement('canvas'); nc.width=w; nc.height=h;
  const nx=nc.getContext('2d');
  const img=nx.createImageData(w,h), d=img.data;
  for(let i=0;i<d.length;i+=4){
    const v=Math.random()*255;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
  }
  nx.putImageData(img,0,0);
  noiseCache=nc; noiseCacheKey=key; return nc;
}

function render(w,h,target,t){
  t = t||0;
  const c=target||cv; c.width=w; c.height=h;
  const g=c.getContext('2d');
  const cols=state.colors;
  const spd=state.speed/50; // ~1.0 at default
  const m=state.motion;

  // motion-derived offsets
  let angleOffset=0, driftX=0, driftY=0, pulsePhase=1, noiseOffX=0, noiseOffY=0;
  if(m==='rotate') angleOffset = t*10*spd; // deg/sec
  if(m==='drift'){ driftX=Math.sin(t*0.5*spd)*0.08*w; driftY=Math.cos(t*0.4*spd)*0.08*h; }
  if(m==='pulse'){ pulsePhase = 0.85 + 0.15*Math.sin(t*1.2*spd); }
  if(m==='shimmer'){ noiseOffX=(t*40*spd)%1000; noiseOffY=(t*27*spd)%1000; }

  // base fill
  if(state.fill==='solid'){
    g.fillStyle=cols[0]; g.fillRect(0,0,w,h);
  } else if(state.fill==='linear'){
    const a=(state.angle+angleOffset)*Math.PI/180;
    const x=Math.cos(a), y=Math.sin(a);
    const cx=w/2+driftX, cy=h/2+driftY, len=(Math.abs(x)*w+Math.abs(y)*h)/2;
    const grad=g.createLinearGradient(cx-x*len,cy-y*len,cx+x*len,cy+y*len);
    cols.forEach((col,i)=>grad.addColorStop(cols.length>1?i/(cols.length-1):0,col));
    g.fillStyle=grad; g.fillRect(0,0,w,h);
  } else if(state.fill==='radial'){
    const cx=w/2+driftX, cy=h/2+driftY;
    const grad=g.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)/1.4*pulsePhase);
    cols.forEach((col,i)=>grad.addColorStop(cols.length>1?i/(cols.length-1):0,col));
    g.fillStyle=grad; g.fillRect(0,0,w,h);
  } else if(state.fill==='mesh'){
    g.fillStyle=cols[cols.length-1]; g.fillRect(0,0,w,h);
    const spots=[[0.25,0.3],[0.75,0.35],[0.5,0.8],[0.15,0.75],[0.85,0.75]];
    g.globalCompositeOperation='lighter';
    cols.forEach((col,i)=>{
      let [sx,sy]=spots[i%spots.length];
      if(m==='wave'){
        sx += Math.sin(t*0.6*spd + i*1.7)*0.09;
        sy += Math.cos(t*0.5*spd + i*2.1)*0.09;
      } else if(m==='drift'){
        sx += driftX/w*0.6; sy += driftY/h*0.6;
      } else if(m==='rotate'){
        const cx0=sx-0.5, cy0=sy-0.5, ang=angleOffset*Math.PI/180*0.3;
        sx = 0.5 + cx0*Math.cos(ang) - cy0*Math.sin(ang);
        sy = 0.5 + cx0*Math.sin(ang) + cy0*Math.cos(ang);
      }
      const r=Math.max(w,h)*0.55*(m==='pulse'?pulsePhase:1);
      const rg=g.createRadialGradient(w*sx,h*sy,0,w*sx,h*sy,r);
      rg.addColorStop(0,col); rg.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=rg; g.fillRect(0,0,w,h);
    });
    g.globalCompositeOperation='source-over';
  }

  // texture
  if(state.texType!=='none' && state.grain>0){
    const scale=state.scale/10;
    const nw=Math.max(2,Math.round(w/scale)), nh=Math.max(2,Math.round(h/scale));
    const noise=buildNoise(nw,nh);
    g.save();
    g.globalAlpha=state.grain/100 * (state.texType==='fine'?0.5:state.texType==='noise'?0.85:0.65);
    g.globalCompositeOperation= state.texType==='noise' ? 'overlay':'soft-light';
    g.imageSmoothingEnabled = state.texType!=='grain';
    if(m==='shimmer'){
      // tile the noise with a shifting offset for a sparkling grain effect
      const ox=noiseOffX%nw, oy=noiseOffY%nh;
      g.drawImage(noise, -ox/nw*w, -oy/nh*h, w, h);
      g.drawImage(noise, w-ox/nw*w, -oy/nh*h, w, h);
      g.drawImage(noise, -ox/nw*w, h-oy/nh*h, w, h);
      g.drawImage(noise, w-ox/nw*w, h-oy/nh*h, w, h);
    } else {
      g.drawImage(noise,0,0,w,h);
    }
    g.restore();
  }

  // vignette
  if(state.vig>0){
    const vg=g.createRadialGradient(w/2,h/2,Math.min(w,h)*0.3,w/2,h/2,Math.max(w,h)*0.72);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(0,0,0,${state.vig/100*0.85})`);
    g.fillStyle=vg; g.fillRect(0,0,w,h);
  }
  return c;
}

/* ---- Animation loop ---- */
let animStart=null, animRAF=null;
function updateAnimLoop(){
  if(state.motion!=='none'){
    if(!animRAF){ animStart=performance.now(); tick(); }
  } else {
    if(animRAF){ cancelAnimationFrame(animRAF); animRAF=null; }
    draw();
  }
}
function tick(){
  const t=(performance.now()-animStart)/1000;
  draw(t);
  animRAF=requestAnimationFrame(tick);
}

function draw(t){
  // preview capped for performance, exports full res
  const maxPrev=1400;
  let pw=state.w, ph=state.h;
  const sc=Math.min(1, maxPrev/Math.max(pw,ph));
  render(Math.round(pw*sc), Math.round(ph*sc), cv, t||0);
}

document.getElementById('export').onclick=()=>{
  const out=document.createElement('canvas');
  render(state.w, state.h, out);
  const a=document.createElement('a');
  a.download=`texture-${state.w}x${state.h}.png`;
  a.href=out.toDataURL('image/png');
  a.click();
};

/* ---- Animated export (WebM) ---- */
document.getElementById('exportVideo').onclick=async ()=>{
  const btn=document.getElementById('exportVideo');
  if(state.motion==='none'){
    alert('Pick a motion type first — "None" has nothing to animate.');
    return;
  }
  if(!window.MediaRecorder){
    alert('Your browser does not support recording. Try Chrome or Edge.');
    return;
  }
  const original=btn.textContent;
  btn.textContent='Recording…'; btn.disabled=true;

  const off=document.createElement('canvas');
  off.width=state.w; off.height=state.h;
  const stream=off.captureStream(30);
  const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond: 12_000_000});
  const chunks=[];
  rec.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };

  const duration=4; // seconds, seamless loop
  const t0=performance.now();
  let frameReq;
  function frame(){
    const t=(performance.now()-t0)/1000;
    render(state.w, state.h, off, t);
    if(t<duration) frameReq=requestAnimationFrame(frame);
  }

  const done=new Promise(res=>{ rec.onstop=res; });
  rec.start();
  frame();
  await new Promise(r=>setTimeout(r, duration*1000+80));
  cancelAnimationFrame(frameReq);
  rec.stop();
  await done;

  const blob=new Blob(chunks,{type:'video/webm'});
  const a=document.createElement('a');
  a.download=`texture-${state.w}x${state.h}.webm`;
  a.href=URL.createObjectURL(blob);
  a.click();

  btn.textContent=original; btn.disabled=false;
};

/* init */
renderColors();
document.getElementById('angleRow').style.opacity=1;
draw();
</script>
</body>
</html>
